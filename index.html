<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RPG Карточка - Установка PWA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a, #0f1a24);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .card {
            max-width: 500px;
            background: #2c2f36;
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #d4af37;
            text-align: center;
        }
        .avatar { font-size: 80px; margin: 20px 0; }
        h1 { color: #ffdd99; margin-bottom: 10px; }
        .stat {
            background: #23262f;
            margin: 15px 0;
            padding: 15px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-name { font-size: 20px; font-weight: bold; color: #ede0c8; }
        .stat-value { font-size: 28px; font-weight: bold; color: #ffdd99; }
        button {
            background: #2f3542;
            border: none;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 30px;
            cursor: pointer;
            color: #eedd99;
            margin: 0 5px;
        }
        .install-btn {
            background: #d4af37;
            color: #1a1a1a;
            font-size: 18px;
            padding: 15px 30px;
            width: auto;
            margin-top: 20px;
            font-weight: bold;
            display: none;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .reset-btn {
            background: #3a2e24;
            margin-top: 10px;
            width: 100%;
        }
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #857c66;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 20px;
            background: #1a1d25;
            font-size: 12px;
            color: #b9aa7a;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="avatar">⚔️🧙</div>
    <h1>Альтаир</h1>
    <div class="stat">
        <span class="stat-name">💪 СИЛА</span>
        <span class="stat-value" id="strength">10</span>
        <div>
            <button onclick="changeStat('strength', 1)">+</button>
            <button onclick="changeStat('strength', -1)">-</button>
        </div>
    </div>
    <div class="stat">
        <span class="stat-name">🏹 ЛОВКОСТЬ</span>
        <span class="stat-value" id="agility">10</span>
        <div>
            <button onclick="changeStat('agility', 1)">+</button>
            <button onclick="changeStat('agility', -1)">-</button>
        </div>
    </div>
    <div class="stat">
        <span class="stat-name">💰 МОНЕТЫ</span>
        <span class="stat-value" id="coins">25</span>
        <div>
            <button onclick="changeCoins(1)">+</button>
            <button onclick="changeCoins(-1)">-</button>
        </div>
    </div>
    <button class="reset-btn" onclick="resetGame()">⟳ СБРОС</button>
    <button class="install-btn" id="installBtn">📲 УСТАНОВИТЬ ПРИЛОЖЕНИЕ</button>
    <div class="status" id="status">🔄 Проверка возможности установки...</div>
    <footer>🎮 Прокачка силы/ловкости = 5 монет</footer>
</div>

<script>
    // ИГРОВАЯ ЛОГИКА
    let strength = 10, agility = 10, coins = 25;
    const COST = 5;
    
    function updateUI() {
        document.getElementById('strength').innerText = strength;
        document.getElementById('agility').innerText = agility;
        document.getElementById('coins').innerText = coins;
        localStorage.setItem('rpgData', JSON.stringify({ strength, agility, coins }));
    }
    
    function changeStat(stat, delta) {
        if (stat === 'strength') {
            if (delta === 1 && coins >= COST) { strength++; coins -= COST; }
            else if (delta === -1 && strength > 0) { strength--; coins += COST; }
            else if (delta === 1 && coins < COST) { alert('❌ Нужно 5 монет!'); return; }
        } else if (stat === 'agility') {
            if (delta === 1 && coins >= COST) { agility++; coins -= COST; }
            else if (delta === -1 && agility > 0) { agility--; coins += COST; }
            else if (delta === 1 && coins < COST) { alert('❌ Нужно 5 монет!'); return; }
        }
        updateUI();
    }
    
    function changeCoins(delta) {
        if (delta === 1) { coins++; }
        else if (delta === -1 && coins > 0) { coins--; }
        else if (delta === -1 && coins === 0) { alert('💰 Нет монет!'); return; }
        updateUI();
    }
    
    function resetGame() {
        strength = 10; agility = 10; coins = 25;
        updateUI();
        alert('✨ Сброс выполнен!');
    }
    
    // ЗАГРУЗКА СОХРАНЕНИЙ
    const saved = localStorage.getItem('rpgData');
    if (saved) {
        const data = JSON.parse(saved);
        strength = data.strength || 10;
        agility = data.agility || 10;
        coins = data.coins || 25;
        updateUI();
    } else { updateUI(); }
    
    // ========== PWA УСТАНОВКА (РАБОЧАЯ) ==========
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    const statusDiv = document.getElementById('status');
    
    // Событие beforeinstallprompt - ГЛАВНОЕ ДЛЯ УСТАНОВКИ
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
        statusDiv.innerHTML = '✅ Приложение ГОТОВО к установке! Нажмите кнопку выше.';
        statusDiv.style.background = '#2a4a2a';
        console.log('✅ beforeinstallprompt сработал!');
    });
    
    // Обработчик кнопки установки
    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
                statusDiv.innerHTML = '✅ Приложение успешно установлено! 🎉';
                statusDiv.style.background = '#2a4a2a';
            } else {
                statusDiv.innerHTML = '❌ Установка отклонена';
            }
            deferredPrompt = null;
        } else {
            statusDiv.innerHTML = '⚠️ К сожалению, установка не поддерживается. Попробуйте Chrome на Android или Edge на ПК.';
        }
    });
    
    // Если PWA уже установлено
    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
        statusDiv.innerHTML = '🎉 Спасибо за установку! Приложение на рабочем столе.';
    });
    
    // Регистрация Service Worker (обязательно!)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('✅ SW зарегистрирован:', reg);
            statusDiv.innerHTML += ' | SW: ✅';
        }).catch(err => {
            console.log('❌ Ошибка SW:', err);
            statusDiv.innerHTML += ' | SW: ❌';
        });
    }
    
    // Если браузер не поддерживает установку
    if (window.matchMedia('(display-mode: standalone)').matches) {
        installBtn.style.display = 'none';
        statusDiv.innerHTML = '🎮 Приложение уже запущено как PWA!';
    }
</script>
</body>
</html>
