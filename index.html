<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Пятнашки 3x3 — Челлендж</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        .game-panel {
            background: #2c2a1f;
            border-radius: 40px;
            padding: 24px;
            box-shadow: inset 0 1px 5px rgba(255,255,200,0.2), 0 12px 28px rgba(0,0,0,0.4);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            background-color: #b87c4a;
            width: 100%;
            height: auto;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: #1f2a1b;
            padding: 8px 20px;
            border-radius: 60px;
        }

        .moves-box, .timer-box {
            color: #ffefb9;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .moves-box span, .timer-box span {
            font-size: 0.85rem;
            color: #e6d5a8;
        }

        button {
            background: #f5bc70;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            color: #2a3b1f;
            cursor: pointer;
            transition: all 0.12s linear;
            box-shadow: 0 5px 0 #9b5e1a;
            font-family: inherit;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9b5e1a;
        }

        .victory-message {
            background: #e5c45e;
            color: #1e4a2a;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            text-align: center;
            animation: bounce 0.4s ease;
        }

        .leaderboard {
            margin-top: 20px;
            background: #1f2a1bcc;
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 12px 20px;
            color: #ffefb9;
            font-size: 0.9rem;
            text-align: center;
        }

        .leaderboard h4 {
            margin: 0 0 8px 0;
            color: #f5bc70;
        }

        .leaderboard p {
            margin: 4px 0;
            font-family: monospace;
            font-size: 1rem;
        }

        @keyframes bounce {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 550px) {
            .game-container { padding: 12px; }
            .game-panel { padding: 14px; }
            .stats { padding: 5px 12px; gap: 12px; }
            .moves-box, .timer-box { font-size: 1.2rem; }
            button { padding: 6px 18px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <canvas id="puzzleCanvas" width="420" height="420"></canvas>
            <div class="info">
                <div class="stats">
                    <div class="moves-box">
                        <span>ходы</span> <span id="moveCounter">0</span>
                    </div>
                    <div class="timer-box">
                        <span>время</span> <span id="timerDisplay">0.00</span><span>с</span>
                    </div>
                </div>
                <button id="resetBtn">🔄 Заново</button>
            </div>
            <div id="victoryMsg" style="text-align: center; margin-top: 16px; min-height: 70px;"></div>
            <div class="leaderboard">
                <h4>🏆 Лучший результат 🏆</h4>
                <p id="bestRecord">— пока нет —</p>
                <p style="font-size:0.75rem; opacity:0.7;">(сохраняется в браузере)</p>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ========== ФИКСИРОВАННАЯ КОМБИНАЦИЯ ==========
        // Вы выбрали: _82713546
        // В формате 3x3: 
        // _ 8 2
        // 7 1 3
        // 5 4 6
        const FIXED_BOARD = [0, 8, 2, 7, 1, 3, 5, 4, 6];
        
        const SIZE = 3;
        const TILE_COUNT = SIZE * SIZE;
        
        let board = [...FIXED_BOARD];  // начинаем с фиксированной комбинации
        let moves = 0;
        let gameOver = false;
        let timerSeconds = 0;
        let timerInterval = null;
        let bestTime = localStorage.getItem('fifteenBestTime') ? parseFloat(localStorage.getItem('fifteenBestTime')) : null;
        
        // DOM элементы
        const canvas = document.getElementById('puzzleCanvas');
        const ctx = canvas.getContext('2d');
        const moveSpan = document.getElementById('moveCounter');
        const timerDisplaySpan = document.getElementById('timerDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const victoryDiv = document.getElementById('victoryMsg');
        const bestRecordP = document.getElementById('bestRecord');
        
        let tileSize = 0;
        
        // Показать лучший результат
        function updateBestDisplay() {
            if (bestTime !== null) {
                bestRecordP.innerHTML = `⏱️ ${bestTime.toFixed(2)} секунд (${bestTime < 60 ? '🚀' : '👍'})`;
            } else {
                bestRecordP.innerHTML = '— пока нет —';
            }
        }
        
        // Проверка победы
        function checkVictory() {
            for(let i = 0; i < TILE_COUNT - 1; i++) {
                if(board[i] !== i + 1) return false;
            }
            return board[TILE_COUNT - 1] === 0;
        }
        
        // Остановка таймера при победе
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        // Запуск таймера (только если игра не окончена)
        function startTimerIfNeeded() {
            if (!gameOver && !timerInterval) {
                timerInterval = setInterval(() => {
                    if (!gameOver) {
                        timerSeconds += 0.1;
                        timerDisplaySpan.innerText = timerSeconds.toFixed(2);
                    }
                }, 100);
            }
        }
        
        // Сброс таймера
        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            timerDisplaySpan.innerText = '0.00';
            if (!gameOver) {
                startTimerIfNeeded();
            }
        }
        
        // Перемещение тайла
        function moveTile(index) {
            if(gameOver) return false;
            if(board[index] === 0) return false;
            
            const zeroIdx = board.indexOf(0);
            const rowIndex = Math.floor(index / SIZE);
            const colIndex = index % SIZE;
            const zeroRow = Math.floor(zeroIdx / SIZE);
            const zeroCol = zeroIdx % SIZE;
            
            const isAdjacent = (Math.abs(rowIndex - zeroRow) + Math.abs(colIndex - zeroCol)) === 1;
            if(isAdjacent) {
                [board[index], board[zeroIdx]] = [board[zeroIdx], board[index]];
                moves++;
                moveSpan.innerText = moves;
                drawBoard();
                
                if(checkVictory()) {
                    gameOver = true;
                    stopTimer();
                    const victoryTime = timerSeconds;
                    victoryDiv.innerHTML = `<div class="victory-message">✨ ПОБЕДА! ✨<br>🎉 ${victoryTime.toFixed(2)} секунд, ${moves} ходов 🎉</div>`;
                    
                    // Проверка рекорда
                    if (bestTime === null || victoryTime < bestTime) {
                        bestTime = victoryTime;
                        localStorage.setItem('fifteenBestTime', bestTime);
                        updateBestDisplay();
                        victoryDiv.innerHTML = `<div class="victory-message">🏆 НОВЫЙ РЕКОРД! 🏆<br>✨ ${victoryTime.toFixed(2)} секунд, ${moves} ходов ✨</div>`;
                    }
                }
                return true;
            }
            return false;
        }
        
        // Полный сброс игры (фиксированная комбинация)
        function resetGame() {
            stopTimer();
            board = [...FIXED_BOARD];
            moves = 0;
            gameOver = false;
            moveSpan.innerText = '0';
            victoryDiv.innerHTML = '';
            timerSeconds = 0;
            timerDisplaySpan.innerText = '0.00';
            drawBoard();
            startTimerIfNeeded();
        }
        
        // Отрисовка
        function drawBoard() {
            const canvasSize = canvas.width;
            tileSize = canvasSize / SIZE;
            
            ctx.fillStyle = '#b26b36';
            ctx.fillRect(0, 0, canvasSize, canvasSize);
            
            for(let i = 0; i < TILE_COUNT; i++) {
                const row = Math.floor(i / SIZE);
                const col = i % SIZE;
                const x = col * tileSize;
                const y = row * tileSize;
                const value = board[i];
                
                if(value !== 0) {
                    const grad = ctx.createLinearGradient(x+2, y+2, x+tileSize-10, y+tileSize-10);
                    grad.addColorStop(0, '#fff2cf');
                    grad.addColorStop(1, '#ffe3a3');
                    ctx.fillStyle = grad;
                    ctx.fillRect(x+1, y+1, tileSize-3, tileSize-3);
                    
                    ctx.strokeStyle = '#9b6e42';
                    ctx.lineWidth = 2.5;
                    ctx.strokeRect(x+1.5, y+1.5, tileSize-5, tileSize-5);
                    
                    ctx.fillStyle = '#e7c27d';
                    ctx.fillRect(x+4, y+4, tileSize-9, tileSize-9);
                    
                    let fontSize = Math.floor(tileSize * 0.45);
                    ctx.font = `bold ${fontSize}px "Segoe UI", "Roboto", system-ui`;
                    ctx.fillStyle = '#2c4724';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(value.toString(), x + tileSize/2, y + tileSize/2);
                } else {
                    ctx.fillStyle = '#c48344';
                    ctx.fillRect(x, y, tileSize-2, tileSize-2);
                    ctx.fillStyle = '#b06e36';
                    ctx.fillRect(x+3, y+3, tileSize-8, tileSize-8);
                    ctx.fillStyle = '#e6bc7c';
                    ctx.beginPath();
                    ctx.arc(x + tileSize/2, y + tileSize/2, tileSize*0.12, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = '#8b5a2e';
                    ctx.beginPath();
                    ctx.arc(x + tileSize/2, y + tileSize/2, tileSize*0.07, 0, 2*Math.PI);
                    ctx.fill();
                }
            }
            
            ctx.beginPath();
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = '#6e4622';
            for(let i = 1; i < SIZE; i++) {
                const pos = i * tileSize;
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvasSize);
                ctx.moveTo(0, pos);
                ctx.lineTo(canvasSize, pos);
                ctx.stroke();
            }
        }
        
        // Обработка кликов
        function handleCanvasInteraction(e) {
            if(gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            
            if(canvasX >= 0 && canvasX < canvas.width && canvasY >= 0 && canvasY < canvas.height) {
                const currentTileSize = canvas.width / SIZE;
                const col = Math.floor(canvasX / currentTileSize);
                const row = Math.floor(canvasY / currentTileSize);
                const index = row * SIZE + col;
                if(index >= 0 && index < TILE_COUNT) {
                    moveTile(index);
                }
            }
        }
        
        // Привязка событий
        function attachEvents() {
            canvas.addEventListener('click', handleCanvasInteraction);
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleCanvasInteraction(e);
            });
            resetBtn.addEventListener('click', () => resetGame());
        }
        
        // Инициализация
        function init() {
            updateBestDisplay();
            attachEvents();
            resetGame();  // запускает фиксированную доску и таймер
        }
        
        init();
    })();
</script>
</body>
</html>
